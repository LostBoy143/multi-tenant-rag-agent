<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG SaaS - Test Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fira+Code:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #f63399;
    --pink-light: rgba(246, 51, 153, 0.08);
    --pink-mid: rgba(246, 51, 153, 0.15);
    --pink-glow: rgba(246, 51, 153, 0.25);
    --blush: #fee9ed;
    --mint: #dbfce7;
    --mint-deep: #b8f5ce;
    --bg: #fef6f7;
    --bg-white: #ffffff;
    --bg-sidebar: #fff5f7;
    --border: #f0d4da;
    --border-light: #f8e2e6;
    --text: #2d1f24;
    --text-secondary: #8a6b73;
    --text-muted: #c4a0aa;
    --danger: #e83e5a;
    --danger-light: rgba(232, 62, 90, 0.1);
    --warning: #e6930b;
    --warning-light: rgba(230, 147, 11, 0.12);
    --success: #22a85a;
    --font-body: "DM Sans", sans-serif;
    --font-display: "Sora", sans-serif;
    --font-mono: "Fira Code", monospace;
    --radius: 12px;
    --radius-lg: 20px;
    --radius-pill: 100px;
    --shadow-sm: 0 1px 3px rgba(45, 31, 36, 0.06);
    --shadow-md: 0 4px 16px rgba(45, 31, 36, 0.08);
    --shadow-lg: 0 8px 32px rgba(45, 31, 36, 0.1);
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    grid-column: 1 / -1;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-white);
    border-bottom: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    position: relative;
    z-index: 10;
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 34px; height: 34px;
    background: var(--pink);
    border-radius: 10px;
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-weight: 700; font-size: 15px;
    color: #fff;
    box-shadow: 0 2px 10px var(--pink-glow);
  }

  .logo h1 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo h1 span { color: var(--text-muted); font-weight: 400; font-size: 14px; }

  .health-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 14px;
    border-radius: var(--radius-pill);
    background: var(--bg);
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border-light);
  }

  .health-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .health-pill.ok .dot { background: var(--success); box-shadow: 0 0 6px rgba(34,168,90,0.4); }
  .health-pill.fail .dot { background: var(--danger); }

  /* ─── SIDEBAR ─── */
  aside {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-light);
    padding: 22px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .section-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* ─── FORMS ─── */
  input[type="text"], input[type="password"], textarea {
    width: 100%;
    background: var(--bg-white);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px var(--pink-light);
  }

  input::placeholder, textarea::placeholder { color: var(--text-muted); }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .field { margin-bottom: 14px; }

  button {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--pink);
    color: #fff;
    box-shadow: 0 2px 8px var(--pink-glow);
  }

  .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 4px 14px var(--pink-glow); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: var(--bg-white);
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--pink); color: var(--pink); }

  .btn-full { width: 100%; }

  .divider-text {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    margin: 12px 0;
    position: relative;
  }

  .divider-text::before, .divider-text::after {
    content: "";
    position: absolute;
    top: 50%;
    width: calc(50% - 16px);
    height: 1px;
    background: var(--border);
  }

  .divider-text::before { left: 0; }
  .divider-text::after { right: 0; }

  /* ─── API KEY ─── */
  .key-display {
    background: var(--blush);
    border: 1.5px dashed var(--pink);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--pink);
    word-break: break-all;
    margin-top: 12px;
    line-height: 1.6;
  }

  .key-display .hint {
    display: block;
    font-family: var(--font-body);
    font-size: 10px;
    color: var(--warning);
    margin-top: 8px;
    font-weight: 500;
  }

  .key-explain {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .key-explain strong { color: var(--text); }

  .key-explain code {
    background: var(--blush);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--pink);
  }

  /* ─── CONNECTED TENANT ─── */
  .tenant-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-white);
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow-sm);
  }

  .tenant-card .name { font-weight: 600; font-size: 14px; }

  .tenant-card .tid {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── DROP ZONE ─── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 26px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--bg-white);
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--pink);
    background: var(--pink-light);
  }

  .drop-zone input { display: none; }

  .drop-zone .dz-icon {
    width: 40px; height: 40px;
    margin: 0 auto 10px;
    border-radius: 10px;
    background: var(--blush);
    display: grid; place-items: center;
    font-size: 20px;
    color: var(--pink);
    transition: all 0.25s;
  }

  .drop-zone:hover .dz-icon { background: var(--pink-mid); transform: scale(1.05); }

  .drop-zone p { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .drop-zone small { display: block; margin-top: 4px; font-size: 11px; color: var(--text-muted); }

  /* ─── DOCUMENTS LIST ─── */
  .doc-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: var(--bg-white);
    border: 1px solid var(--border-light);
    margin-bottom: 8px;
    font-size: 13px;
    transition: box-shadow 0.2s;
  }

  .doc-item:hover { box-shadow: var(--shadow-sm); }
  .doc-item.is-new { animation: slideIn 0.35s ease-out; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } }

  .doc-item .name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .status-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .status-badge.processing { background: var(--warning-light); color: var(--warning); }
  .status-badge.ready { background: var(--mint); color: var(--success); }
  .status-badge.failed { background: var(--danger-light); color: var(--danger); }

  .doc-delete {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px; border-radius: 6px;
    transition: all 0.2s; font-size: 16px; line-height: 1;
  }

  .doc-delete:hover { color: var(--danger); background: var(--danger-light); }

  /* ─── MAIN CHAT ─── */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
  }

  .chat-empty .empty-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    background: var(--blush);
    display: grid; place-items: center;
    font-size: 28px;
    color: var(--pink);
  }

  .chat-empty h2 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .chat-empty p { font-size: 13px; color: var(--text-muted); max-width: 340px; line-height: 1.6; }

  /* ─── MESSAGES ─── */
  .msg {
    max-width: 680px;
    animation: fadeUp 0.3s ease-out;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 9px;
    flex-shrink: 0;
    display: grid; place-items: center;
    font-size: 13px; font-weight: 700;
    font-family: var(--font-display);
  }

  .msg.user .msg-avatar { background: var(--pink); color: #fff; }
  .msg.bot .msg-avatar { background: var(--mint); color: var(--success); }

  .msg-content { min-width: 0; }

  .msg-bubble {
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.user .msg-bubble {
    background: var(--pink);
    color: #fff;
    border-radius: var(--radius-lg) var(--radius-lg) 6px var(--radius-lg);
    box-shadow: 0 2px 10px var(--pink-glow);
  }

  .msg.bot .msg-bubble {
    background: var(--bg-white);
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 6px;
    box-shadow: var(--shadow-sm);
    color: var(--text);
  }

  .msg.bot .msg-bubble pre {
    background: var(--blush);
    padding: 10px 14px;
    border-radius: 8px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 12px;
    border: 1px solid var(--border-light);
  }

  .msg.bot .msg-bubble code {
    background: var(--blush);
    padding: 1px 6px;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--pink);
  }

  .typing-indicator {
    display: flex; gap: 5px; padding: 14px 18px;
    background: var(--bg-white);
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 6px;
    box-shadow: var(--shadow-sm);
    width: fit-content;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ─── CHAT INPUT ─── */
  .chat-input-bar {
    padding: 0 32px 22px;
    background: transparent;
  }

  .chat-input-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 5px 5px 5px 22px;
    box-shadow: var(--shadow-md);
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .chat-input-wrap:focus-within {
    border-color: var(--pink);
    box-shadow: var(--shadow-md), 0 0 0 3px var(--pink-light);
  }

  .chat-input-wrap textarea {
    flex: 1;
    resize: none;
    border: none;
    background: transparent;
    min-height: 36px;
    max-height: 100px;
    padding: 8px 12px 8px 0;
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
    font-family: var(--font-body);
    outline: none;
  }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--pink);
    color: #fff;
    display: grid; place-items: center;
    font-size: 15px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .send-btn:hover { transform: scale(1.08); box-shadow: 0 3px 12px var(--pink-glow); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.2; transform: none; box-shadow: none; }

  /* ─── TOAST ─── */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    animation: toastIn 0.35s ease-out;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(8px);
  }

  .toast.error { background: var(--danger); color: #fff; }
  .toast.success { background: var(--mint); color: var(--success); border: 1px solid var(--mint-deep); }
  .toast.info { background: var(--bg-white); color: var(--text); border: 1px solid var(--border-light); }

  @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border-light); max-height: 40vh; }
    .chat-area { padding: 20px 16px; }
    .chat-input-bar { padding: 10px 16px 14px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark">R</div>
      <h1>RAG Console <span>/ test</span></h1>
    </div>
    <div class="health-pill" id="healthPill">
      <span class="dot"></span>
      <span id="healthText">checking...</span>
    </div>
  </header>

  <aside>
    <section>
      <div class="section-label">Tenant</div>
      <div id="tenantSetup">
        <div class="field">
          <label for="tenantName">Company name</label>
          <input type="text" id="tenantName" placeholder="e.g. Acme Corp">
        </div>
        <button class="btn-primary btn-full" onclick="registerTenant()">Register new tenant</button>
        <div class="divider-text">or</div>
        <div class="field">
          <label for="existingKey">Paste existing API key</label>
          <input type="password" id="existingKey" placeholder="xxxxxxxx.xxxxxxxx...">
        </div>
        <button class="btn-ghost btn-full" onclick="useExistingKey()">Connect</button>
      </div>
      <div id="tenantConnected" style="display: none;">
        <div class="tenant-card">
          <div>
            <div class="name" id="tenantNameDisplay"></div>
            <div class="tid" id="tenantIdDisplay"></div>
          </div>
          <button class="btn-ghost" onclick="disconnect()" style="font-size: 11px; padding: 6px 12px;">Disconnect</button>
        </div>
      </div>
      <div id="newKeyDisplay" style="display: none;"></div>
    </section>

    <section id="docsSection" style="display: none;">
      <div class="section-label">Documents</div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" onchange="uploadFile(this.files[0])">
        <div class="dz-icon">+</div>
        <p>Drop file or click to upload</p>
        <small>PDF, DOCX, TXT up to 20 MB</small>
      </div>
      <div id="docsList" style="margin-top: 14px;"></div>
    </section>
  </aside>

  <main>
    <div class="chat-area" id="chatArea">
      <div class="chat-empty" id="chatEmpty">
        <div class="empty-icon">?</div>
        <h2>Ask anything about your docs</h2>
        <p>Register a tenant and upload documents first, then ask questions and get AI-powered answers.</p>
      </div>
    </div>
    <div class="chat-input-bar">
      <div class="chat-input-wrap">
        <textarea id="questionInput" placeholder="Ask something..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)" disabled></textarea>
        <button class="send-btn" id="sendBtn" onclick="askQuestion()" disabled>&#8593;</button>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = "http://localhost:8000";
let apiKey = null;
let tenantInfo = null;
let pollTimer = null;
let lastDocsSnapshot = "";

async function checkHealth() {
  const pill = document.getElementById("healthPill");
  const text = document.getElementById("healthText");
  try {
    const r = await fetch(`${API}/api/v1/health`);
    const d = await r.json();
    pill.className = d.status === "ok" ? "health-pill ok" : "health-pill fail";
    text.textContent = d.status === "ok" ? "connected" : "degraded";
  } catch {
    pill.className = "health-pill fail";
    text.textContent = "offline";
  }
}

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

async function registerTenant() {
  const name = document.getElementById("tenantName").value.trim();
  if (!name) { toast("Enter a company name.", "error"); return; }
  try {
    const r = await fetch(`${API}/api/v1/tenants`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || r.statusText); }
    const data = await r.json();
    apiKey = data.api_key;
    tenantInfo = data.tenant;
    showConnected();
    const kd = document.getElementById("newKeyDisplay");
    kd.style.display = "block";
    kd.innerHTML =
      `<div class="key-display">${apiKey}<span class="hint">Save this key -- it won't be shown again.</span></div>
       <div class="key-explain">
         <strong>What is this?</strong> This API key authenticates your company. Pass it as an <code>X-API-Key</code> header in every API call. It keeps your data isolated from other tenants. This test UI uses it automatically.
       </div>`;
    toast("Tenant registered.", "success");
  } catch (e) { toast(e.message, "error"); }
}

async function useExistingKey() {
  const key = document.getElementById("existingKey").value.trim();
  if (!key) { toast("Paste your API key.", "error"); return; }
  apiKey = key;
  try {
    const r = await fetch(`${API}/api/v1/tenants/me`, { headers: { "X-API-Key": apiKey } });
    if (!r.ok) { apiKey = null; throw new Error("Invalid API key."); }
    tenantInfo = await r.json();
    showConnected();
    toast("Connected.", "success");
  } catch (e) { toast(e.message, "error"); }
}

function showConnected() {
  document.getElementById("tenantSetup").style.display = "none";
  document.getElementById("tenantConnected").style.display = "block";
  document.getElementById("docsSection").style.display = "block";
  document.getElementById("tenantNameDisplay").textContent = tenantInfo.name;
  document.getElementById("tenantIdDisplay").textContent = tenantInfo.id;
  document.getElementById("questionInput").disabled = false;
  document.getElementById("sendBtn").disabled = false;
  loadDocuments();
  pollTimer = setInterval(loadDocuments, 5000);
}

function disconnect() {
  apiKey = null; tenantInfo = null; lastDocsSnapshot = "";
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById("tenantSetup").style.display = "block";
  document.getElementById("tenantConnected").style.display = "none";
  document.getElementById("docsSection").style.display = "none";
  document.getElementById("newKeyDisplay").style.display = "none";
  document.getElementById("questionInput").disabled = true;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("docsList").innerHTML = "";
  document.getElementById("chatArea").innerHTML =
    `<div class="chat-empty" id="chatEmpty"><div class="empty-icon">?</div><h2>Ask anything about your docs</h2><p>Register a tenant and upload documents first.</p></div>`;
}

async function loadDocuments() {
  if (!apiKey) return;
  try {
    const r = await fetch(`${API}/api/v1/documents`, { headers: { "X-API-Key": apiKey } });
    if (!r.ok) return;
    const docs = await r.json();
    const snapshot = JSON.stringify(docs);
    if (snapshot === lastDocsSnapshot) return;
    const prevIds = new Set(lastDocsSnapshot ? JSON.parse(lastDocsSnapshot).map(d => d.id) : []);
    lastDocsSnapshot = snapshot;
    renderDocs(docs, prevIds);
    if (!docs.some(d => d.status === "processing") && pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  } catch {}
}

function renderDocs(docs, prevIds) {
  const el = document.getElementById("docsList");
  if (!docs.length) { el.innerHTML = `<div style="font-size: 12px; color: var(--text-muted); text-align: center; padding: 12px;">No documents yet.</div>`; return; }
  el.innerHTML = docs.map(d => {
    const isNew = !prevIds.has(d.id);
    return `<div class="doc-item${isNew ? " is-new" : ""}">
      <span class="name" title="${d.filename}">${d.filename}</span>
      <span class="status-badge ${d.status}">${d.status}${d.status === "ready" ? ` (${d.chunk_count})` : ""}</span>
      <button class="doc-delete" onclick="deleteDoc('${d.id}')" title="Delete">&times;</button>
    </div>`;
  }).join("");
}

async function deleteDoc(id) {
  if (!confirm("Delete this document and all its chunks?")) return;
  try {
    await fetch(`${API}/api/v1/documents/${id}`, { method: "DELETE", headers: { "X-API-Key": apiKey } });
    toast("Document deleted.", "info");
    lastDocsSnapshot = "";
    loadDocuments();
  } catch { toast("Delete failed.", "error"); }
}

const dropZone = document.getElementById("dropZone");
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("dragover");
  if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
});

async function uploadFile(file) {
  if (!file || !apiKey) return;
  const form = new FormData();
  form.append("file", file);
  try {
    const r = await fetch(`${API}/api/v1/documents/upload`, {
      method: "POST", headers: { "X-API-Key": apiKey }, body: form,
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || "Upload failed."); }
    toast(`Uploaded: ${file.name}`, "success");
    lastDocsSnapshot = "";
    loadDocuments();
    if (!pollTimer) pollTimer = setInterval(loadDocuments, 3000);
  } catch (e) { toast(e.message, "error"); }
  document.getElementById("fileInput").value = "";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); askQuestion(); }
}

function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

async function askQuestion() {
  const input = document.getElementById("questionInput");
  const question = input.value.trim();
  if (!question || !apiKey) return;

  const empty = document.getElementById("chatEmpty");
  if (empty) empty.remove();

  appendMsg(question, "user");
  input.value = ""; input.style.height = "auto";
  input.disabled = true;
  document.getElementById("sendBtn").disabled = true;

  const typingEl = appendTyping();

  try {
    const r = await fetch(`${API}/api/v1/chat/query`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-API-Key": apiKey },
      body: JSON.stringify({ question }),
    });
    typingEl.remove();
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || "Query failed."); }
    const data = await r.json();
    appendBotMsg(data.answer, data.sources);
  } catch (e) {
    typingEl.remove();
    appendBotMsg(`Error: ${e.message}`, []);
  }

  input.disabled = false;
  document.getElementById("sendBtn").disabled = false;
  input.focus();
}

function appendMsg(text, role) {
  const area = document.getElementById("chatArea");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const avatarLabel = role === "user" ? "Y" : "AI";
  div.innerHTML = `<div class="msg-avatar">${avatarLabel}</div><div class="msg-content"><div class="msg-bubble">${escapeHtml(text)}</div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendBotMsg(text, sources) {
  const area = document.getElementById("chatArea");
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-content"><div class="msg-bubble">${formatAnswer(text)}</div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendTyping() {
  const area = document.getElementById("chatArea");
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function escapeHtml(t) {
  const d = document.createElement("div"); d.textContent = t; return d.innerHTML;
}

function formatAnswer(text) {
  let s = escapeHtml(text);
  s = s.replace(/```([\s\S]*?)```/g, "<pre>$1</pre>");
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\n/g, "<br>");
  return s;
}

checkHealth();
setInterval(checkHealth, 15000);
</script>
</body>
</html>
